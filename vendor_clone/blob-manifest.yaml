
# =============================================================================
# Vendor blob manifest for Xiaomi spinel (Redmi Note 15 4G)
# SoC: MediaTek MT6789
# Build: missi-user 16 BP2A.250605.031.A3 OS3.0.301.0.WPGMIXM
#
# This manifest is the MASTER CONFIG for the vendor tree.
# It drives blob extraction, post-processing, and tree validation.
#
# Usage (GitHub bot / extract script):
#   1. Parse YAML, iterate blobs[]
#   2. For each blob: db pull from source, place at destination
#   3. After extraction, apply post_process rules (matched by path pattern)
#   4. Verify on_device:true blobs exist, on_device:false are generated
#
# =============================================================================

device:
  codename: spinel
  model: Redmi Note 15 4G
  soc: mt6789
  manufacturer: xiaomi
  build: OS3.0.301.0.WPGMIXM
  android: 16

build:
  target_level: "6"
  sepolicy_version: "31.0"

# ---------------------------------------------------------------------------
# Post-processing rules
# These define transformations applied AFTER blob extraction.
# Rules are matched by file path patterns (glob).
# ---------------------------------------------------------------------------
post_process:

  # --- HIGH PRIORITY: Build artifacts (must be regenerated) ---
  - rule: strip_protobuf
    description: "Remove .pb files (contain build hashes, regenerated at build time)"
    action: remove
    match: "**/*.pb"

  - rule: strip_linker_config
    description: "Linker config protobuf must match target build library paths"
    action: remove
    match: "vendor/etc/linker.config.pb"

  - rule: strip_apex_artifacts
    description: "APEX packages stripped (kept in system_ext, not vendor)"
    action: remove
    match: "vendor/apex/*"

  - rule: strip_meta_inf
    description: "APK signing metadata removed"
    action: remove
    match: "vendor/META-INF/*"

  - rule: strip_build_prop
    description: "Stock build.prop removed (build fingerprint mismatch)"
    action: remove
    match:
      - "vendor/build.prop"
      - "vendor/ro.prop"
      - "vendor/rw.prop"

  - rule: regenerate_manifest_xml
    description: "VINTF manifest.xml regenerated from fragments via manifestmerger"
    action: generate
    tool: manifestmerger
    input_dir: "vendor/etc/vintf/manifest/"
    output: "vendor/etc/vintf/manifest.xml"

  - rule: compile_file_contexts
    description: "Compile SELinux file_contexts.bin from file_contexts"
    action: compile
    tool: sefcontext_compile
    input: "file_contexts"
    output: "file_contexts.bin"

  # --- MEDIUM PRIORITY: Configuration patches ---
  - rule: patch_init_rc
    description: "Verify/fix binary paths in init .rc files"
    action: patch_regex
    match: "vendor/etc/init/*.rc"
    patches:
      - search: "(/vendor/bin/)\\S+"
        replace: "\{hw_binary}"

  - rule: patch_ueventd
    description: "Verify MTK device node permissions in ueventd.rc"
    action: verify
    match: "vendor/etc/ueventd.rc"
    verify:
      - pattern: "/dev/dma_heap/mtk_"
      - pattern: "/dev/trusty"
      - pattern: "/dev/ccci"

  - rule: patch_audio_policy
    description: "Update audio HAL service names in policy config"
    action: patch_regex
    match: "vendor/etc/audio_policy_configuration.xml"
    patches:
      - search: 'hal="audio\\.primary\\.\\w+"'
        replace: 'hal="audio.primary.mt6789"'

  - rule: patch_bluetooth_audio_policy
    description: "Update BT audio HAL service names"
    action: patch_regex
    match: "vendor/etc/bluetooth_audio_policy_configuration.xml"
    patches:
      - search: 'hal="audio\\.bluetooth\\.\\w+"'
        replace: 'hal="audio.bluetooth.default"'

  - rule: populate_vndservice_contexts
    description: "Populate vendor service contexts (currently empty)"
    action: verify
    match: "vendor/etc/selinux/vndservice_contexts"

  - rule: populate_hwservice_contexts
    description: "Populate vendor hwservice contexts (currently empty)"
    action: verify
    match: "vendor/etc/selinux/vendor_hwservice_contexts"

  # --- LOW PRIORITY: Codec & media ---
  - rule: verify_media_codecs
    description: "Verify codec library paths in media codec XMLs"
    action: verify
    match: "vendor/etc/*codec*.xml"

  - rule: verify_gitattributes
    description: "Ensure large binaries tracked via Git LFS"
    action: generate
    tool: lfs_config
    output: ".gitattributes"
    params:
      threshold_mb: 50
      patterns:
        - "vendor/firmware/*"
        - "vendor/lib64/*compiler*.so"
        - "vendor/lib64/*mvpu*.so"
        - "vendor/lib64/*_sa.ca7.so"
        - "vendor/lib64/*Secure*.so"

